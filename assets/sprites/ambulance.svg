<svg xmlns="http://www.w3.org/2000/svg" width="72" height="38" viewBox="0 0 72 38">
  <!-- Скорая, вид сверху, носом вправо: белый фургон, красная полоса,
       красный крест на крыше, световая балка (сами огни мигают в render.js). -->
  <rect x="2" y="3" width="68" height="32" rx="6" fill="#000" opacity="0.15" transform="translate(0.5 1)"/>
  <rect x="2" y="3" width="68" height="32" rx="6" fill="#d9d5cc"/>
  <rect x="3.4" y="4.4" width="65.2" height="29.2" rx="4.8" fill="#f4f4f2"/>
  <!-- красная полоса по бортам -->
  <rect x="4" y="4.6" width="60" height="2.8" fill="#e63946" opacity="0.9"/>
  <rect x="4" y="30.6" width="60" height="2.8" fill="#e63946" opacity="0.9"/>
  <!-- капот-«нос» -->
  <path d="M58 5 Q68.4 6.2 69 19 Q68.4 31.8 58 33 Z" fill="#e8e6df"/>
  <!-- лобовое стекло -->
  <path d="M52.6 5.6 Q58.6 6.8 59.6 19 Q58.6 31.2 52.6 32.4 Q50.4 25.8 50.4 19 Q50.4 12.2 52.6 5.6 Z" fill="#2e3440"/>
  <!-- крыша фургона -->
  <rect x="8" y="6.8" width="42" height="24.4" rx="4" fill="#ffffff"/>
  <rect x="8" y="6.8" width="42" height="24.4" rx="4" fill="none" stroke="#cfc8bc" stroke-width="0.9" opacity="0.6"/>
  <!-- красный крест на крыше -->
  <rect x="24.6" y="13.2" width="8.8" height="11.6" fill="none"/>
  <rect x="26.8" y="12.6" width="4.4" height="12.8" rx="1" fill="#e63946"/>
  <rect x="22.6" y="16.8" width="12.8" height="4.4" rx="1" fill="#e63946"/>
  <!-- световая балка у кабины: тёмная база, огни рисует render поверх -->
  <rect x="42.6" y="12.6" width="4.2" height="12.8" rx="1.8" fill="#2e3440"/>
  <!-- зеркала -->
  <rect x="50" y="0.8" width="5" height="3.6" rx="1.6" fill="#a9a294"/>
  <rect x="50" y="33.6" width="5" height="3.6" rx="1.6" fill="#a9a294"/>
  <!-- фары и габариты -->
  <rect x="67.6" y="7" width="2.6" height="5" rx="1.3" fill="#ffe9a8"/>
  <rect x="67.6" y="26" width="2.6" height="5" rx="1.3" fill="#ffe9a8"/>
  <rect x="2.4" y="7" width="2.2" height="5" rx="1.1" fill="#d84a3a"/>
  <rect x="2.4" y="26" width="2.2" height="5" rx="1.1" fill="#d84a3a"/>
</svg>
