<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200">
  <!-- Нижний декор: школа с двором, мурал Купаты, хачапурная, будка
       «Народный выбор», зелень. Вид сверху (крыши). -->
  <rect x="0" y="0" width="960" height="200" fill="#a3c585"/>
  <!-- газонные пятна -->
  <g fill="#96b978">
    <ellipse cx="120" cy="160" rx="60" ry="22"/>
    <ellipse cx="500" cy="176" rx="80" ry="20"/>
    <ellipse cx="840" cy="150" rx="70" ry="26"/>
  </g>
  <!-- дорожки от тротуара -->
  <rect x="150" y="0" width="26" height="34" fill="#d8d3c8"/>
  <rect x="580" y="0" width="26" height="26" fill="#d8d3c8"/>
  <!-- ШКОЛА: черепичная крыша с коньком, двор с классиками -->
  <g transform="translate(40 30)">
    <rect x="-4" y="-2" width="248" height="96" rx="6" fill="#8a9a6d"/>
    <rect x="0" y="0" width="240" height="92" rx="4" fill="#c96f4a"/>
    <rect x="4" y="4" width="232" height="84" rx="3" fill="#d67d55"/>
    <!-- ряды черепицы -->
    <g stroke="#b85c3e" stroke-width="2">
      <path d="M6 18 L234 18 M6 32 L234 32 M6 60 L234 60 M6 74 L234 74"/>
    </g>
    <!-- конёк -->
    <rect x="4" y="42" width="232" height="8" rx="4" fill="#a94f33"/>
    <!-- мансардные окна -->
    <rect x="52" y="22" width="18" height="12" rx="2" fill="#2e3440"/>
    <rect x="52" y="21" width="18" height="3" rx="1.5" fill="#e9e4da"/>
    <rect x="170" y="58" width="18" height="12" rx="2" fill="#2e3440"/>
    <rect x="170" y="70" width="18" height="3" rx="1.5" fill="#e9e4da"/>
    <!-- флажок школы -->
    <circle cx="120" cy="46" r="4" fill="#e9e4da"/>
    <path d="M120 46 L120 30 L134 34 L120 38" fill="#e05780" stroke="#e9e4da" stroke-width="1"/>
  </g>
  <!-- школьный двор с классиками -->
  <g transform="translate(96 134)">
    <rect x="0" y="0" width="128" height="54" rx="6" fill="#d8d3c8"/>
    <g fill="none" stroke="#f4f4f2" stroke-width="2">
      <rect x="14" y="10" width="14" height="12"/>
      <rect x="28" y="10" width="14" height="12"/>
      <rect x="21" y="22" width="14" height="12"/>
      <rect x="14" y="34" width="14" height="12"/>
      <rect x="28" y="34" width="14" height="12"/>
    </g>
    <circle cx="92" cy="27" r="16" fill="none" stroke="#f4f4f2" stroke-width="2"/>
    <circle cx="92" cy="27" r="5" fill="none" stroke="#f4f4f2" stroke-width="2"/>
  </g>
  <!-- МУРАЛ КУПАТЫ на стене — по настоящему муралу в Батуми: серая стена с
       диагональными полосами, сидящий анфас белый пёс в золотой короне,
       столбики «KU PA TA» и «კუპატა» с штрихами. -->
  <g transform="translate(310 36)">
    <clipPath id="muralWall"><rect x="3" y="3" width="154" height="62" rx="2"/></clipPath>
    <rect x="-4" y="-4" width="168" height="76" rx="4" fill="#8a9a6d"/>
    <rect x="0" y="0" width="160" height="68" rx="3" fill="#b9b9b4"/>
    <rect x="3" y="3" width="154" height="62" rx="2" fill="#dcdcd8"/>
    <!-- диагональные серые полосы под собакой -->
    <g clip-path="url(#muralWall)" fill="#c9c9c4">
      <path d="M3 56 L157 40 L157 47 L3 63 Z"/>
      <path d="M3 68 L157 52 L157 59 L3 75 Z"/>
    </g>
    <g clip-path="url(#muralWall)">
      <!-- задняя лапа поджата вбок -->
      <ellipse cx="98" cy="52" rx="15" ry="11" fill="#eceae4" stroke="#2a2a2a" stroke-width="1.4"/>
      <!-- корпус-«колбаска» -->
      <ellipse cx="82" cy="44" rx="18" ry="18" fill="#f6f4ef" stroke="#2a2a2a" stroke-width="1.4"/>
      <!-- пятно на плече и крапинки на груди -->
      <ellipse cx="68" cy="36" rx="5" ry="6.5" transform="rotate(14 68 36)" fill="#1f1f1f"/>
      <circle cx="78" cy="40" r="0.9" fill="#1f1f1f"/>
      <circle cx="86" cy="43" r="0.8" fill="#1f1f1f"/>
      <circle cx="80" cy="47" r="0.7" fill="#1f1f1f"/>
      <!-- передние лапы прямые, крупные ступни вперёд -->
      <path d="M73 44 L72 58 Q72 61 76 61 L78 61 Q80 61 80 58 L80 44 Z" fill="#f6f4ef" stroke="#2a2a2a" stroke-width="1.2"/>
      <path d="M85 44 L85 58 Q85 61 89 61 L91 61 Q93 61 93 58 L92 44 Z" fill="#f6f4ef" stroke="#2a2a2a" stroke-width="1.2"/>
      <ellipse cx="76" cy="60.5" rx="5.4" ry="3" fill="#f6f4ef" stroke="#2a2a2a" stroke-width="1.2"/>
      <ellipse cx="89.5" cy="60.5" rx="5.4" ry="3" fill="#f6f4ef" stroke="#2a2a2a" stroke-width="1.2"/>
      <circle cx="76" cy="59.4" r="0.7" fill="#1f1f1f"/>
      <circle cx="89.5" cy="59.4" r="0.7" fill="#1f1f1f"/>
      <!-- висячие чёрные уши -->
      <ellipse cx="71" cy="19" rx="3.6" ry="7" transform="rotate(14 71 19)" fill="#1f1f1f" stroke="#2a2a2a" stroke-width="1"/>
      <ellipse cx="93" cy="19" rx="3.6" ry="7" transform="rotate(-14 93 19)" fill="#1f1f1f" stroke="#2a2a2a" stroke-width="1"/>
      <!-- голова: белая, чёрная «шапка»-маска с белой проточиной -->
      <circle cx="82" cy="22" r="11.5" fill="#f6f4ef" stroke="#2a2a2a" stroke-width="1.4"/>
      <path d="M72 27 Q70 13 79 11.4 Q78.4 18 77.6 25 Q74.6 28.4 72 27 Z" fill="#1f1f1f"/>
      <path d="M92 27 Q94 13 85 11.4 Q85.6 18 86.4 25 Q89.4 28.4 92 27 Z" fill="#1f1f1f"/>
      <!-- глаза (грустновато-спокойные) на маске -->
      <circle cx="76.6" cy="20.6" r="2.3" fill="#f6f4ef"/>
      <circle cx="87.4" cy="20.6" r="2.3" fill="#f6f4ef"/>
      <circle cx="76.9" cy="21" r="1.4" fill="#1a1a1a"/>
      <circle cx="87.1" cy="21" r="1.4" fill="#1a1a1a"/>
      <!-- нос и пасть -->
      <ellipse cx="82" cy="27" rx="3.2" ry="2.4" fill="#1a1a1a"/>
      <path d="M82 29.4 Q82 31.6 79.4 32.2 M82 29.4 Q82 31.6 84.6 32.2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
      <!-- золотая корона с зубцами и искоркой -->
      <path d="M73.5 12.5 L76 5 L79.5 10 L82 4 L84.5 10 L88 5 L90.5 12.5 Q82 15.5 73.5 12.5 Z" fill="#e0a32e" stroke="#b87d18" stroke-width="1"/>
      <path d="M82.8 5.4 L83.4 7 L85 7.6 L83.4 8.2 L82.8 9.8 L82.2 8.2 L80.6 7.6 L82.2 7 Z" fill="#ffffff"/>
    </g>
    <!-- надписи как на мурале: столбики с короткими штрихами -->
    <g fill="#2a2a2a" font-family="system-ui, sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">
      <rect x="16" y="9" width="16" height="2.4"/>
      <rect x="16" y="13.4" width="10" height="2.4"/>
      <text x="24" y="26">KU</text>
      <text x="24" y="37">PA</text>
      <text x="24" y="48">TA</text>
      <rect x="130" y="9" width="16" height="2.4"/>
      <rect x="136" y="13.4" width="10" height="2.4"/>
      <text x="138" y="26">კუ</text>
      <text x="138" y="37">პა</text>
      <text x="138" y="48">ტა</text>
    </g>
  </g>
  <!-- ХАЧАПУРНАЯ: крыша и вывеска -->
  <g transform="translate(520 28)">
    <rect x="-4" y="-2" width="188" height="80" rx="6" fill="#8a9a6d"/>
    <rect x="0" y="0" width="180" height="76" rx="4" fill="#b85c3e"/>
    <rect x="4" y="4" width="172" height="68" rx="3" fill="#c96f4a"/>
    <g stroke="#a94f33" stroke-width="2">
      <path d="M6 20 L174 20 M6 38 L174 38 M6 56 L174 56"/>
    </g>
    <!-- труба с дымком -->
    <rect x="140" y="12" width="14" height="14" rx="2" fill="#8c4a32"/>
    <circle cx="147" cy="8" r="5" fill="#f4f4f2" opacity="0.8"/>
    <circle cx="154" cy="2" r="3.6" fill="#f4f4f2" opacity="0.6"/>
    <!-- вывеска у входа -->
    <rect x="30" y="62" width="120" height="24" rx="4" fill="#f4f1ea"/>
    <rect x="30" y="62" width="120" height="24" rx="4" fill="none" stroke="#8a5a33" stroke-width="2"/>
    <text x="90" y="73" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#b85c3e">ხაჭაპური</text>
    <text x="90" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#7a5c3e">ХАЧАПУРНАЯ</text>
    <!-- хачапури на вывеске -->
    <circle cx="42" cy="74" r="6" fill="#d9932f"/>
    <circle cx="42" cy="74" r="4" fill="#f2c14e"/>
    <circle cx="42" cy="74" r="2" fill="#f7dc8c"/>
  </g>
  <!-- БУДКА Купаты с табличкой «Народный выбор» -->
  <g transform="translate(742 14)">
    <ellipse cx="26" cy="30" rx="34" ry="24" fill="#96b978"/>
    <!-- двускатная крыша сверху: две половинки -->
    <rect x="0" y="6" width="52" height="40" rx="4" fill="#8a5a33"/>
    <path d="M2 26 L50 26" stroke="#6f4526" stroke-width="3"/>
    <rect x="2" y="8" width="48" height="16" rx="3" fill="#a9743f"/>
    <rect x="2" y="28" width="48" height="16" rx="3" fill="#9a6738"/>
    <!-- миска у будки -->
    <circle cx="62" cy="40" r="6" fill="#4a72c4"/>
    <circle cx="62" cy="40" r="3.6" fill="#f7dc8c"/>
    <!-- табличка -->
    <rect x="-12" y="52" width="76" height="16" rx="3" fill="#f4f1ea" stroke="#8a5a33" stroke-width="1.6"/>
    <text x="26" y="62.6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.8" font-weight="bold" fill="#7a5c3e">НАРОДНЫЙ ВЫБОР</text>
  </g>
  <!-- пальмы и кусты справа и в прогалах -->
  <g id="palmB" transform="translate(880 60)">
    <circle cx="0" cy="0" r="3.4" fill="#8a5a33"/>
    <g fill="#4f9d69">
      <ellipse cx="0" cy="-10" rx="4" ry="10"/>
      <ellipse cx="0" cy="10" rx="4" ry="10"/>
      <ellipse cx="-10" cy="0" rx="10" ry="4"/>
      <ellipse cx="10" cy="0" rx="10" ry="4"/>
      <ellipse cx="-7" cy="-7" rx="8" ry="3.6" transform="rotate(-45 -7 -7)"/>
      <ellipse cx="7" cy="-7" rx="8" ry="3.6" transform="rotate(45 7 -7)"/>
      <ellipse cx="-7" cy="7" rx="8" ry="3.6" transform="rotate(45 -7 7)"/>
      <ellipse cx="7" cy="7" rx="8" ry="3.6" transform="rotate(-45 7 7)"/>
    </g>
    <circle cx="0" cy="0" r="2.2" fill="#3d7f53"/>
  </g>
  <use href="#palmB" x="-40" y="70"/>
  <use href="#palmB" x="-580" y="100"/>
  <g fill="#7fae63">
    <circle cx="300" cy="150" r="12"/>
    <circle cx="322" cy="158" r="9"/>
    <circle cx="700" cy="140" r="11"/>
    <circle cx="722" cy="132" r="8"/>
    <circle cx="960" cy="40" r="14"/>
  </g>
</svg>
