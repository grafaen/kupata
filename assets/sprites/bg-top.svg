<svg xmlns="http://www.w3.org/2000/svg" width="960" height="120" viewBox="0 0 960 120">
  <!-- Верхняя панорама Батуми: море с чайками, колесо обозрения, башня
       Алфавита; набережная с пальмами, скамейками и фонарями. -->
  <!-- море -->
  <rect x="0" y="0" width="960" height="90" fill="#3bb8ae"/>
  <rect x="0" y="0" width="960" height="26" fill="#35a89f"/>
  <!-- волны -->
  <g fill="none" stroke="#5cc9c0" stroke-width="2.4" stroke-linecap="round" opacity="0.9">
    <path d="M30 38 q9 -7 18 0 M70 52 q9 -7 18 0 M140 34 q9 -7 18 0"/>
    <path d="M210 56 q9 -7 18 0 M270 40 q9 -7 18 0 M340 60 q9 -7 18 0"/>
    <path d="M420 36 q9 -7 18 0 M480 54 q9 -7 18 0 M560 42 q9 -7 18 0"/>
    <path d="M640 58 q9 -7 18 0 M700 38 q9 -7 18 0 M880 44 q9 -7 18 0"/>
  </g>
  <!-- блики -->
  <g fill="#8fdcd5" opacity="0.7">
    <ellipse cx="110" cy="70" rx="14" ry="2"/>
    <ellipse cx="380" cy="74" rx="18" ry="2"/>
    <ellipse cx="620" cy="68" rx="12" ry="2"/>
    <ellipse cx="840" cy="76" rx="16" ry="2"/>
  </g>
  <!-- прибой у набережной -->
  <path d="M0 86 q24 5 48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 t48 0 L960 90 L0 90 Z" fill="#bfeae6" opacity="0.85"/>
  <!-- чайки -->
  <g fill="none" stroke="#f4f4f2" stroke-width="2" stroke-linecap="round">
    <path d="M175 22 q5 -5 10 0 q5 -5 10 0"/>
    <path d="M240 34 q4 -4 8 0 q4 -4 8 0"/>
    <path d="M540 20 q5 -5 10 0 q5 -5 10 0"/>
  </g>
  <!-- парусник -->
  <g transform="translate(80 14)">
    <path d="M0 12 L26 12 L21 16 L4 16 Z" fill="#e9e4da"/>
    <path d="M12 12 L12 -2 L3 12 Z" fill="#f4f4f2"/>
    <path d="M14 12 L14 0 L23 12 Z" fill="#e0dacd"/>
  </g>
  <!-- колесо обозрения -->
  <g transform="translate(742 40)" stroke="#2c7f78" fill="none">
    <circle cx="0" cy="0" r="30" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" stroke-width="1.4" opacity="0.7"/>
    <path d="M0 -30 L0 30 M-30 0 L30 0 M-21 -21 L21 21 M-21 21 L21 -21" stroke-width="1.6"/>
    <path d="M-14 46 L0 2 L14 46" stroke-width="3.4"/>
    <circle cx="0" cy="0" r="3.6" fill="#2c7f78"/>
    <g fill="#e05780" stroke="none">
      <circle cx="0" cy="-30" r="3"/><circle cx="30" cy="0" r="3"/>
      <circle cx="0" cy="30" r="3"/><circle cx="-30" cy="0" r="3"/>
      <circle cx="21" cy="-21" r="3"/><circle cx="21" cy="21" r="3"/>
      <circle cx="-21" cy="-21" r="3"/><circle cx="-21" cy="21" r="3"/>
    </g>
  </g>
  <!-- башня Алфавита: решётчатая спираль с шаром -->
  <g transform="translate(882 6)">
    <path d="M-13 84 Q-15 40 -4 10 M13 84 Q15 40 4 10" fill="none" stroke="#2c7f78" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M-12 70 Q0 64 12 70 M-13 54 Q0 48 13 54 M-12 38 Q0 32 12 38 M-8 22 Q0 18 8 22" fill="none" stroke="#2c7f78" stroke-width="1.8"/>
    <path d="M-12 62 Q0 68 12 62 M-13 46 Q0 52 13 46 M-11 30 Q0 36 11 30" fill="none" stroke="#5cc9c0" stroke-width="1.8"/>
    <circle cx="0" cy="8" r="7.6" fill="#2c7f78"/>
    <circle cx="-2" cy="6" r="2.6" fill="#5cc9c0"/>
  </g>
  <!-- набережная -->
  <rect x="0" y="90" width="960" height="30" fill="#e9d8a6"/>
  <rect x="0" y="90" width="960" height="3" fill="#d9c48b"/>
  <path d="M0 106 L960 106" stroke="#d9c48b" stroke-width="1.4" stroke-dasharray="14 10"/>
  <!-- пальмы (вид сверху: веер листьев вокруг ствола) -->
  <g id="palm" transform="translate(60 104)">
    <circle cx="0" cy="0" r="3" fill="#8a5a33"/>
    <g fill="#4f9d69">
      <ellipse cx="0" cy="-8" rx="3.4" ry="8"/>
      <ellipse cx="0" cy="8" rx="3.4" ry="8"/>
      <ellipse cx="-8" cy="0" rx="8" ry="3.4"/>
      <ellipse cx="8" cy="0" rx="8" ry="3.4"/>
      <ellipse cx="-6" cy="-6" rx="6.4" ry="3" transform="rotate(-45 -6 -6)"/>
      <ellipse cx="6" cy="-6" rx="6.4" ry="3" transform="rotate(45 6 -6)"/>
      <ellipse cx="-6" cy="6" rx="6.4" ry="3" transform="rotate(45 -6 6)"/>
      <ellipse cx="6" cy="6" rx="6.4" ry="3" transform="rotate(-45 6 6)"/>
    </g>
    <circle cx="0" cy="0" r="2" fill="#3d7f53"/>
  </g>
  <use href="#palm" x="180" y="2"/>
  <use href="#palm" x="330" y="-2"/>
  <use href="#palm" x="470" y="2"/>
  <use href="#palm" x="610" y="-1"/>
  <use href="#palm" x="850" y="1"/>
  <!-- скамейки -->
  <g fill="#a9743f">
    <rect x="140" y="100" width="22" height="7" rx="2"/>
    <rect x="410" y="100" width="22" height="7" rx="2"/>
    <rect x="700" y="100" width="22" height="7" rx="2"/>
  </g>
  <g fill="#8a5a33">
    <rect x="140" y="103" width="22" height="1.6"/>
    <rect x="410" y="103" width="22" height="1.6"/>
    <rect x="700" y="103" width="22" height="1.6"/>
  </g>
  <!-- фонари -->
  <g>
    <circle cx="255" cy="103" r="3.4" fill="#f7dc8c"/>
    <circle cx="255" cy="103" r="1.6" fill="#fdeebc"/>
    <circle cx="545" cy="103" r="3.4" fill="#f7dc8c"/>
    <circle cx="545" cy="103" r="1.6" fill="#fdeebc"/>
    <circle cx="790" cy="103" r="3.4" fill="#f7dc8c"/>
    <circle cx="790" cy="103" r="1.6" fill="#fdeebc"/>
  </g>
</svg>
