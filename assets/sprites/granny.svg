<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
  <!-- Бабушка Нино, вид сверху: платок в горошек, платье, тарелка с хачапури. -->
  <ellipse cx="13" cy="19" rx="11" ry="10" fill="#000" opacity="0.12"/>
  <!-- руки к тарелке -->
  <circle cx="4.6" cy="24" r="2.4" fill="#e9b98d"/>
  <circle cx="21.4" cy="24" r="2.4" fill="#e9b98d"/>
  <!-- платье -->
  <ellipse cx="13" cy="18" rx="10" ry="9" fill="#8d5a68"/>
  <ellipse cx="13" cy="17" rx="7.6" ry="6.6" fill="#a26e7d"/>
  <!-- тарелка с хачапури перед ней -->
  <circle cx="13" cy="27.6" r="5.6" fill="#f4f4f2"/>
  <circle cx="13" cy="27.6" r="4.4" fill="#d9932f"/>
  <circle cx="13" cy="27.6" r="3" fill="#f2c14e"/>
  <circle cx="13" cy="27.6" r="1.7" fill="#f7dc8c"/>
  <!-- голова в платке -->
  <circle cx="13" cy="12" r="6.4" fill="#b56576"/>
  <circle cx="13" cy="12.8" r="4" fill="#f2c9a0"/>
  <path d="M8 8.4 Q13 4.4 18 8.4 Q15.6 6.2 13 6.2 Q10.4 6.2 8 8.4 Z" fill="#9d4f60"/>
  <!-- узел платка сзади -->
  <circle cx="13" cy="5.6" r="1.8" fill="#9d4f60"/>
  <!-- горошек -->
  <circle cx="9.4" cy="10" r="0.8" fill="#f4f4f2"/>
  <circle cx="16.6" cy="10" r="0.8" fill="#f4f4f2"/>
  <circle cx="12" cy="7.6" r="0.8" fill="#f4f4f2"/>
</svg>
