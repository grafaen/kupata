<svg xmlns="http://www.w3.org/2000/svg" width="48" height="32" viewBox="0 0 48 32">
  <!-- Купата объелся (настоящий окрас с мурала): круглый живот, лапы
       враскоряку, язык; закрытые глаза — светлые чёрточки на чёрной маске. -->
  <ellipse cx="23" cy="17" rx="17" ry="10" fill="#000" opacity="0.18"/>
  <path d="M7 16 Q3 18 3 22" fill="none" stroke="#f2efe9" stroke-width="3.4" stroke-linecap="round"/>
  <!-- лапы враскоряку -->
  <ellipse cx="29" cy="6.6" rx="3.2" ry="2.3" fill="#e5e0d7"/>
  <ellipse cx="29" cy="25.4" rx="3.2" ry="2.3" fill="#e5e0d7"/>
  <ellipse cx="13" cy="6.6" rx="3.2" ry="2.3" fill="#d9d4cc"/>
  <ellipse cx="13" cy="25.4" rx="3.2" ry="2.3" fill="#d9d4cc"/>
  <!-- раздутый корпус -->
  <ellipse cx="21" cy="16" rx="15.4" ry="10" fill="#f2efe9"/>
  <ellipse cx="20" cy="15" rx="11.4" ry="6.4" fill="#faf8f2"/>
  <ellipse cx="21" cy="17.6" rx="8.4" ry="4.4" fill="#f0e7d8"/>
  <ellipse cx="24.5" cy="21.8" rx="3.8" ry="2.7" transform="rotate(14 24.5 21.8)" fill="#1f1f1f"/>
  <circle cx="27" cy="10.6" r="0.9" fill="#1f1f1f"/>
  <circle cx="24.4" cy="9.2" r="0.7" fill="#1f1f1f"/>
  <!-- голова откинута -->
  <circle cx="36.6" cy="16" r="7.2" fill="#f2efe9"/>
  <ellipse cx="35.9" cy="11.9" rx="5.2" ry="3.3" fill="#1f1f1f"/>
  <ellipse cx="35.9" cy="20.1" rx="5.2" ry="3.3" fill="#1f1f1f"/>
  <path d="M33.6 16 L43 14.1 L43 17.9 Z" fill="#f2efe9"/>
  <ellipse cx="33.6" cy="9.8" rx="2.8" ry="3.8" transform="rotate(-30 33.6 9.8)" fill="#1f1f1f"/>
  <ellipse cx="33.6" cy="22.2" rx="2.8" ry="3.8" transform="rotate(30 33.6 22.2)" fill="#1f1f1f"/>
  <!-- закрытые глаза (светлые чёрточки на маске) и язык -->
  <path d="M36.2 12.4 l2.6 0.8 M36.2 19.6 l2.6 -0.8" stroke="#f2efe9" stroke-width="1" stroke-linecap="round"/>
  <ellipse cx="42.6" cy="16" rx="3.6" ry="2.9" fill="#faf8f2"/>
  <ellipse cx="45" cy="16" rx="1.8" ry="1.6" fill="#1a1a1a"/>
  <path d="M44.4 17.4 Q45.8 19.4 44.6 21" fill="none" stroke="#e07a7a" stroke-width="2" stroke-linecap="round"/>
</svg>
