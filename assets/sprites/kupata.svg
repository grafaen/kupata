<svg xmlns="http://www.w3.org/2000/svg" width="48" height="32" viewBox="0 0 48 32">
  <!-- Купата, вид сверху, мордой вправо. Кадр бега A (лапы враскид). -->
  <!-- тень -->
  <ellipse cx="23" cy="17" rx="16" ry="9" fill="#000" opacity="0.12"/>
  <!-- хвост -->
  <path d="M9 16 Q3 13 4 7" fill="none" stroke="#e8842c" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M4.6 8.6 Q4 7 4.9 5.6" fill="none" stroke="#f4a95c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- лапы: кадр A — левая передняя и правая задняя вынесены -->
  <ellipse cx="31" cy="7.5" rx="3.4" ry="2.4" fill="#d1731f"/>
  <ellipse cx="15" cy="24.5" rx="3.4" ry="2.4" fill="#d1731f"/>
  <ellipse cx="30" cy="25.5" rx="2.9" ry="2.1" fill="#c2681a"/>
  <ellipse cx="16" cy="6.5" rx="2.9" ry="2.1" fill="#c2681a"/>
  <!-- корпус -->
  <ellipse cx="22" cy="16" rx="14" ry="8.6" fill="#e8842c"/>
  <!-- спина (блик) -->
  <ellipse cx="21" cy="15.2" rx="10" ry="5" fill="#f09a48"/>
  <path d="M12 16 Q22 13.4 32 16" fill="none" stroke="#d1731f" stroke-width="1.2" opacity="0.6"/>
  <!-- голова -->
  <circle cx="36" cy="16" r="7.6" fill="#e8842c"/>
  <ellipse cx="35.4" cy="15" rx="5.4" ry="4.4" fill="#f09a48"/>
  <!-- уши -->
  <ellipse cx="33" cy="9.4" rx="3" ry="4" transform="rotate(-30 33 9.4)" fill="#b5641c"/>
  <ellipse cx="33" cy="22.6" rx="3" ry="4" transform="rotate(30 33 22.6)" fill="#b5641c"/>
  <!-- морда и нос -->
  <ellipse cx="42.4" cy="16" rx="4" ry="3.2" fill="#f4a95c"/>
  <ellipse cx="45.2" cy="16" rx="1.7" ry="1.5" fill="#4a2c14"/>
</svg>
