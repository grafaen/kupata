<svg xmlns="http://www.w3.org/2000/svg" width="100" height="40" viewBox="0 0 100 40">
  <!-- Маршрутка, вид сверху, носом вправо: длинный фургон, рейлинги, синяя полоса. -->
  <rect x="2" y="3" width="96" height="34" rx="6" fill="#000" opacity="0.15" transform="translate(0.5 1)"/>
  <rect x="2" y="3" width="96" height="34" rx="6" fill="#cfc8bc"/>
  <rect x="3.4" y="4.4" width="93.2" height="31.2" rx="4.8" fill="#e8e4da"/>
  <!-- синяя полоса по бортам -->
  <rect x="4" y="4.6" width="88" height="2.6" fill="#4a72c4" opacity="0.85"/>
  <rect x="4" y="32.8" width="88" height="2.6" fill="#4a72c4" opacity="0.85"/>
  <!-- капот-«нос» -->
  <path d="M84 5 Q96 6.4 96.6 20 Q96 33.6 84 35 Z" fill="#dcd6c9"/>
  <!-- лобовое стекло -->
  <path d="M78 5.6 Q84.6 6.8 85.6 20 Q84.6 33.2 78 34.4 Q75.6 27.6 75.6 20 Q75.6 12.4 78 5.6 Z" fill="#2e3440"/>
  <!-- длинная крыша с рейлингами и люками -->
  <rect x="10" y="7.4" width="64" height="25.2" rx="4" fill="#f2efe8"/>
  <path d="M13 9.4 L70 9.4 M13 30.6 L70 30.6" stroke="#b9b2a4" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="20" y="13" width="12" height="14" rx="2.4" fill="#dcd6c9"/>
  <rect x="44" y="13" width="12" height="14" rx="2.4" fill="#dcd6c9"/>
  <!-- зеркала -->
  <rect x="76" y="0.8" width="5" height="3.6" rx="1.6" fill="#8f887a"/>
  <rect x="76" y="35.6" width="5" height="3.6" rx="1.6" fill="#8f887a"/>
  <!-- фары и габариты -->
  <rect x="95.2" y="7" width="2.6" height="5" rx="1.3" fill="#ffe9a8"/>
  <rect x="95.2" y="28" width="2.6" height="5" rx="1.3" fill="#ffe9a8"/>
  <rect x="2.4" y="7" width="2.2" height="5" rx="1.1" fill="#d84a3a"/>
  <rect x="2.4" y="28" width="2.2" height="5" rx="1.1" fill="#d84a3a"/>
</svg>
