<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Купата — герой Батуми</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game" width="960" height="640"></canvas>

  <!-- Звук: M или клик; состояние в localStorage (kupata.muted). -->
  <button id="mute-btn" type="button" aria-label="Звук">🔊</button>

  <!-- Экран game over; тексты заполняет main.js из strings.js (задел под i18n M5). -->
  <div id="gameover" class="overlay hidden">
    <div class="card">
      <h1 id="go-title"></h1>
      <p id="go-score" class="card-score"></p>
      <p id="go-best"></p>
      <p id="go-kids"></p>
      <p id="go-khachapuri"></p>
      <button id="go-again" type="button"></button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
