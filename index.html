<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Купата — герой Батуми</title>
  <meta name="description" content="Bark cars to a stop so the kids can cross the road. A free browser game about Kupata, Batumi’s real hero dog.">

  <!-- Превью шаринга (OG статичен, язык — английский; заголовок на странице
       переключается i18n). og:image — абсолютный URL: скраперы не резолвят
       относительные пути. -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://qupata.ge/">
  <meta property="og:title" content="Kupata — Hero of Batumi">
  <meta property="og:description" content="Bark cars to a stop so the kids can cross the road. A free browser game about Kupata, Batumi’s real hero dog.">
  <meta property="og:image" content="https://qupata.ge/assets/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">

  <!-- SVG-favicon + PNG (Safari без SVG) + иконка домашнего экрана iOS. -->
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="assets/icon-32.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game" width="960" height="640"></canvas>

  <!-- Кнопки поверх canvas: звук (M) и пауза (P/Esc). -->
  <button id="mute-btn" type="button" aria-label="Звук">🔊</button>
  <button id="pause-btn" type="button" aria-label="Пауза">⏸</button>

  <!-- Мобильное управление: джойстик + «ГАВ!», видны по pointer: coarse. -->
  <div id="touch-controls">
    <div id="joystick"><div id="joystick-nub"></div></div>
    <button id="bark-btn" type="button" data-i18n="ui.bark"></button>
  </div>

  <!-- Экраны — HTML-оверлеи (impl-plan 3.3); тексты по data-i18n из i18n.js. -->
  <div id="menu" class="overlay">
    <div class="card">
      <img class="menu-dog" src="assets/sprites/kupata.svg" alt="Купата">
      <h1 data-i18n="ui.title"></h1>
      <div class="lang-switch" role="group" aria-label="Язык">
        <button type="button" data-lang="ka">ქარ</button>
        <button type="button" data-lang="ru">RU</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <input id="player-name" type="text" maxlength="12" autocomplete="nickname" data-i18n="ui.namePlaceholder">
      <button id="menu-play" type="button" data-i18n="ui.play"></button>
      <button id="menu-howto" type="button" class="secondary" data-i18n="ui.howto"></button>
      <button id="menu-about" type="button" class="secondary" data-i18n="ui.about"></button>
      <a class="repo-link" href="https://github.com/grafaen/kupata" target="_blank" rel="noopener" data-i18n="ui.github"></a>
    </div>
  </div>

  <div id="howto" class="overlay hidden">
    <div class="card card-howto">
      <h1 data-i18n="ui.howto"></h1>
      <p data-i18n="howto.goal"></p>
      <p data-i18n="howto.hit"></p>
      <p data-i18n="howto.move"></p>
      <p data-i18n="howto.bark"></p>
      <p data-i18n="howto.energy"></p>
      <p data-i18n="howto.ambulance"></p>
      <p data-i18n="howto.pause"></p>
      <button id="howto-back" type="button" data-i18n="ui.back"></button>
    </div>
  </div>

  <!-- «О Купате» — история настоящего пса (docs/kupata-facts.md). Названия
       изданий в ссылках — имена собственные, не переводятся (без data-i18n). -->
  <div id="about" class="overlay hidden">
    <div class="card card-howto">
      <h1 data-i18n="ui.about"></h1>
      <p data-i18n="about.p1"></p>
      <p data-i18n="about.p2"></p>
      <p class="cartoon"><a href="https://www.youtube.com/watch?v=PUNFDhJsbKw" target="_blank" rel="noopener" data-i18n="about.cartoon"></a></p>
      <p class="memorial" data-i18n="about.memory"></p>
      <p class="sources">
        <span data-i18n="about.sources"></span>
        <a href="https://www.rferl.org/a/georgia-batumi-helpful-dog/30393655.html" target="_blank" rel="noopener">RFE/RL</a> ·
        <a href="https://www.newsgeorgia.ge/umerla-kupata-simvol-batumi-i-samaja-izvestnaja-sobaka-gruzii/" target="_blank" rel="noopener">NewsGeorgia</a> ·
        <a href="https://www.goodnewsnetwork.org/internet-famous-crossing-guard-dog-presented-with-doghouse/" target="_blank" rel="noopener">Good News Network</a>
      </p>
      <button id="about-back" type="button" data-i18n="ui.back"></button>
      <a class="repo-link" href="https://github.com/grafaen/kupata" target="_blank" rel="noopener" data-i18n="ui.github"></a>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="card">
      <h1 data-i18n="ui.paused"></h1>
      <button id="pause-resume" type="button" data-i18n="ui.resume"></button>
      <button id="pause-restart" type="button" class="secondary" data-i18n="ui.restart"></button>
      <button id="pause-menu" type="button" class="secondary" data-i18n="ui.toMenu"></button>
    </div>
  </div>

  <div id="gameover" class="overlay hidden">
    <div class="card">
      <h1 id="go-title"></h1>
      <p id="go-score" class="card-score"></p>
      <p id="go-best"></p>
      <p id="go-kids"></p>
      <p id="go-khachapuri"></p>
      <button id="go-again" type="button" data-i18n="ui.again"></button>
      <button id="go-menu" type="button" class="secondary" data-i18n="ui.toMenu"></button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
